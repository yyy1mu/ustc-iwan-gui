name: Build Linux AppImage

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  appimage:
    name: AppImage x86_64 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run build -- --target x86_64-unknown-linux-gnu --bundles appimage

      - name: Rename AppImage
        run: |
          mkdir -p release
          for file in src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage; do
            cp "$file" "release/USTC-iWAN-${{ matrix.os }}-x86_64.AppImage"
          done

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: USTC-iWAN-${{ matrix.os }}-x86_64.AppImage
          path: release/*.AppImage
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.AppImage
